<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Gemmy AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ============================================================
   CHATGPT-STYLE DARK THEME
   ============================================================ */
:root {
  --sidebar-bg: #171717;
  --sidebar-hover: #212121;
  --sidebar-border: #2F2F2F;
  --main-bg: #212121;
  --surface: #2F2F2F;
  --surface-hover: #3A3A3A;
  --border: #424242;
  --border-light: #373737;
  --text-primary: #ECECEC;
  --text-secondary: #B4B4B4;
  --text-muted: #8E8E8E;
  --text-faint: #676767;
  --accent: #FFFFFF;
  --accent-hover: #E0E0E0;
  --green: #10A37F;
  --green-bg: rgba(16,163,127,0.12);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.12);
  --orange: #F59E0B;
  --blue: #3B82F6;
  --font-sans: 'Söhne', 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-pill: 9999px;
  --sidebar-width: 260px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: var(--font-sans);
  background: var(--main-bg);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.3s var(--ease), width 0.3s var(--ease);
  z-index: 100;
  border-right: 1px solid var(--sidebar-border);
}

.sidebar.collapsed {
  transform: translateX(calc(-1 * var(--sidebar-width)));
  width: 0;
  border-right: none;
  overflow: hidden;
}

.sidebar-header {
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.sidebar-logo:hover { background: var(--sidebar-hover); }

.sidebar-logo svg { width: 24px; height: 24px; }
.sidebar-logo span {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}

.sidebar-toggle {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.sidebar-toggle:hover { background: var(--sidebar-hover); }

.new-chat-btn {
  margin: 4px 12px 12px;
  padding: 10px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.15s;
  font-family: var(--font-sans);
}
.new-chat-btn:hover { background: var(--sidebar-hover); }
.new-chat-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px;
}

.sidebar-section-title {
  padding: 8px 12px 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: none;
}

.sidebar-item {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.sidebar-item:hover { background: var(--sidebar-hover); color: var(--text-primary); }
.sidebar-item.active { background: var(--sidebar-hover); color: var(--text-primary); }
.sidebar-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--sidebar-border);
}

.token-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.token-row:hover { background: var(--sidebar-hover); }

.token-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}
.token-dot.error { background: var(--red); }
.token-dot.loading { background: var(--orange); animation: pulse 1s infinite; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.token-label {
  font-size: 13px;
  color: var(--text-secondary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rotate-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px;
  transition: background 0.15s, color 0.15s;
}
.rotate-btn:hover { background: var(--surface); color: var(--text-primary); }
.rotate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ============================================================
   MAIN AREA
   ============================================================ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}

/* Top bar */
.topbar {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  flex-shrink: 0;
  gap: 8px;
}

.menu-btn {
  width: 36px;
  height: 36px;
  display: none;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.menu-btn:hover { background: var(--surface); }

.model-picker {
  display: flex;
  align-items: center;
  position: relative;
}

.model-trigger {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: background 0.15s;
  font-family: var(--font-sans);
}
.model-trigger:hover { background: var(--surface); }
.model-trigger svg { width: 16px; height: 16px; color: var(--text-muted); }

.model-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 6px;
  min-width: 300px;
  z-index: 200;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.model-dropdown.open { display: block; }

.model-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.15s;
}
.model-option:hover { background: var(--surface-hover); }
.model-option.selected { background: var(--surface-hover); }

.model-radio {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 2px;
  position: relative;
  transition: border-color 0.15s;
}
.model-option.selected .model-radio {
  border-color: var(--accent);
}
.model-option.selected .model-radio::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
}

.model-info { flex: 1; }
.model-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.model-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ============================================================
   CHAT AREA
   ============================================================ */
.chat-container {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* Welcome screen */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
}

.welcome-title {
  font-size: 28px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 24px;
}

.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 600px;
}

.suggestion {
  padding: 10px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  font-family: var(--font-sans);
}
.suggestion:hover { background: var(--surface); border-color: var(--text-faint); }

/* Messages */
.messages {
  max-width: 768px;
  width: 100%;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.msg-group { display: flex; flex-direction: column; gap: 4px; }

.msg-row {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.msg-row.user {
  justify-content: flex-end;
}

.msg-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}

.msg-avatar.assistant-av {
  background: var(--green);
  color: white;
}

.msg-avatar.user-av {
  background: #5436DA;
  color: white;
}

.msg-bubble {
  max-width: 85%;
  line-height: 1.7;
  font-size: 15px;
}

.msg-row.user .msg-bubble {
  background: var(--surface);
  padding: 10px 16px;
  border-radius: 20px 20px 4px 20px;
}

.msg-row.assistant .msg-bubble {
  background: transparent;
  padding: 0;
}

/* Message content */
.msg-content { color: var(--text-primary); word-wrap: break-word; }
.msg-content p { margin-bottom: 8px; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-content code {
  background: var(--sidebar-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
}
.msg-content pre {
  background: var(--sidebar-bg);
  padding: 16px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  margin: 8px 0;
}
.msg-content pre code { background: none; padding: 0; }
.msg-content a { color: var(--blue); text-decoration: none; }
.msg-content a:hover { text-decoration: underline; }
.msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }
.msg-content li { margin-bottom: 4px; }
.msg-content blockquote {
  border-left: 3px solid var(--border);
  padding-left: 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}
.msg-content h1,.msg-content h2,.msg-content h3 { margin: 12px 0 8px; }
.msg-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.msg-content th, .msg-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.msg-content th { background: var(--surface); }

.uploaded-media {
  max-height: 200px;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}

/* Streaming cursor */
.streaming-cursor {
  display: inline-block;
  width: 8px;
  height: 18px;
  background: var(--text-primary);
  margin-left: 2px;
  animation: blink 0.8s infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ============================================================
   INPUT AREA
   ============================================================ */
.input-area {
  padding: 0 24px 24px;
  max-width: 768px;
  width: 100%;
  margin: 0 auto;
  flex-shrink: 0;
}

.input-wrapper {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  padding: 4px;
  display: flex;
  flex-direction: column;
  transition: border-color 0.2s;
}
.input-wrapper:focus-within { border-color: var(--text-faint); }

.file-indicator {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  margin: 4px 8px 0;
  background: var(--sidebar-bg);
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-secondary);
}
.file-indicator.active { display: flex; }
.file-indicator .file-remove {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
}
.file-indicator .file-remove:hover { color: var(--red); background: var(--red-bg); }

.input-row {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  padding: 4px 8px;
}

.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-size: 15px;
  font-family: var(--font-sans);
  resize: none;
  max-height: 200px;
  min-height: 24px;
  line-height: 1.5;
  padding: 8px 4px;
}
.chat-input::placeholder { color: var(--text-muted); }

.input-actions {
  display: flex;
  align-items: center;
  gap: 2px;
}

.input-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-muted);
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.input-btn:hover { background: var(--surface-hover); color: var(--text-secondary); }

.send-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: var(--accent);
  color: var(--main-bg);
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.send-btn svg { width: 18px; height: 18px; }

.input-footer {
  text-align: center;
  padding: 8px 0 0;
  font-size: 12px;
  color: var(--text-faint);
}

/* ============================================================
   IMAGE TAB
   ============================================================ */
.image-container {
  flex: 1;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.image-container.active { display: flex; }
.chat-container.active { display: flex; }

.image-controls {
  padding: 24px;
  max-width: 768px;
  width: 100%;
  margin: 0 auto;
}

.image-input-row {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}

.image-prompt {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: var(--font-sans);
  outline: none;
  transition: border-color 0.2s;
}
.image-prompt:focus { border-color: var(--text-faint); }
.image-prompt::placeholder { color: var(--text-muted); }

.aspect-select {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font-sans);
  outline: none;
  cursor: pointer;
}

.generate-btn {
  padding: 12px 24px;
  background: var(--accent);
  color: var(--main-bg);
  border: none;
  border-radius: var(--radius-lg);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  font-family: var(--font-sans);
  white-space: nowrap;
}
.generate-btn:hover { background: var(--accent-hover); }
.generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.image-result {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
}

.image-placeholder {
  text-align: center;
  color: var(--text-faint);
}
.image-placeholder svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
.image-placeholder p { font-size: 14px; }

.generated-img {
  max-width: 100%;
  max-height: 70vh;
  border-radius: var(--radius-md);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* ============================================================
   TOAST
   ============================================================ */
.toast-container {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  padding: 10px 20px;
  border-radius: var(--radius-pill);
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: toastIn 0.3s var(--ease);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast.success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,163,127,0.2); }
.toast.error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.toast.info { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); }

@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ============================================================
   MOBILE SIDEBAR OVERLAY
   ============================================================ */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}
.sidebar-overlay.active { display: block; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    transform: translateX(calc(-1 * var(--sidebar-width)));
    z-index: 100;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-width))); }
  .menu-btn { display: flex; }

  .messages { padding: 12px 16px; }
  .input-area { padding: 0 12px 16px; }
  .welcome-title { font-size: 22px; }
  .suggestions { gap: 6px; }
  .suggestion { font-size: 13px; padding: 8px 12px; }

  .msg-row.user .msg-bubble { max-width: 90%; }
  .msg-row { gap: 10px; }
  .msg-avatar { width: 24px; height: 24px; font-size: 11px; }

  .image-input-row { flex-direction: column; }
  .image-controls { padding: 16px; }

  .model-dropdown { min-width: 260px; }
}

@media (max-width: 400px) {
  .messages { padding: 8px 8px; }
  .input-area { padding: 0 8px 12px; }
  .msg-row.user .msg-bubble { max-width: 95%; font-size: 14px; }
  .msg-row.assistant .msg-bubble { font-size: 14px; }
  .welcome-title { font-size: 20px; }
}
</style>
</head>
<body>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span>Gemmy</span>
    </div>
    <button class="sidebar-toggle" id="sidebarClose" title="Close sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19l-7-7 7-7M18 19l-7-7 7-7"/></svg>
    </button>
  </div>

  <button class="new-chat-btn" id="newChatBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    New chat
  </button>

  <nav class="sidebar-nav">
    <div class="sidebar-section-title">Tools</div>
    <div class="sidebar-item active" data-tab="chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Chat
    </div>
    <div class="sidebar-item" data-tab="image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      Image Generator
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="token-row" id="tokenRow">
      <div class="token-dot" id="tokenDot"></div>
      <span class="token-label" id="tokenLabel">Token ready</span>
      <button class="rotate-btn" id="rotateBtn" title="Rotate token">⟳</button>
    </div>
  </div>
</aside>

<!-- Main Area -->
<main class="main">
  <!-- Top bar -->
  <div class="topbar">
    <button class="menu-btn" id="menuBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="model-picker">
      <button class="model-trigger" id="modelTrigger">
        <span id="modelLabel">Gemmy</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="model-dropdown" id="modelDropdown"></div>
    </div>
  </div>

  <!-- Chat Container -->
  <div class="chat-container active" id="chatView">
    <div class="welcome" id="welcomeMsg">
      <h1 class="welcome-title">How can I help you today?</h1>
      <div class="suggestions">
        <button class="suggestion" data-prompt="Explain quantum computing in simple terms">Explain quantum computing</button>
        <button class="suggestion" data-prompt="Write a creative short story about a robot">Write a short story</button>
        <button class="suggestion" data-prompt="Help me debug my JavaScript code">Debug my code</button>
        <button class="suggestion" data-prompt="Create a meal plan for the week">Create a meal plan</button>
      </div>
    </div>
    <div class="messages" id="chatMessages"></div>
  </div>

  <!-- Image Container -->
  <div class="image-container" id="imageView">
    <div class="image-controls">
      <div class="image-input-row">
        <input class="image-prompt" id="imgPrompt" placeholder="Describe the image you want to create..." />
        <select class="aspect-select" id="aspectRatio">
          <option value="1:1">1:1</option>
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
        </select>
        <button class="generate-btn" id="generateBtn">Generate</button>
      </div>
    </div>
    <div class="image-result" id="imageResult">
      <div class="image-placeholder" id="imagePlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <p>Your generated image will appear here</p>
      </div>
    </div>
  </div>

  <!-- Input Area (Chat only) -->
  <div class="input-area" id="inputArea">
    <div class="input-wrapper">
      <div class="file-indicator" id="fileIndicator">
        <span>📎</span>
        <span id="fileName"></span>
        <button class="file-remove" id="fileRemove">×</button>
      </div>
      <div class="input-row">
        <div class="input-actions">
          <button class="input-btn" id="uploadBtn" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input type="file" id="fileInput" hidden accept="image/*,.pdf,.txt,.md,.csv,.json,.js,.py" />
        </div>
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="Message Gemmy..."></textarea>
        <div class="input-actions">
          <button class="send-btn" id="sendBtn" disabled title="Send">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="input-footer">Gemmy can make mistakes. Check important info.</div>
  </div>
</main>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ============================================================
  // STATE
  // ============================================================
  const MODELS = [
    { id: 'gemini-2.5-flash-lite', label: 'Gemini 2.5 Flash Lite', desc: 'Fast & efficient' },
    { id: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash', desc: 'Balanced speed' },
    { id: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro', desc: 'Most capable' },
    { id: 'gemini-3.1-flash-lite', label: 'Gemini 3.1 Flash Lite', desc: 'Next-gen fast' },
    { id: 'gemini-3.1-pro-preview', label: 'Gemini 3.1 Pro', desc: 'Preview' },
  ];

  const state = {
    model: 'gemini-2.5-flash-lite',
    modelOpen: false,
    chatHistory: [],
    isStreaming: false,
    uploadedFile: null,
    uploadedFileBase64: null,
    uploadedFileMime: null,
    activeTab: 'chat',
    sidebarOpen: false,
  };

  // ============================================================
  // DOM REFS
  // ============================================================
  const $ = (sel, ctx = document) => ctx.querySelector(sel);
  const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

  const dom = {
    sidebar: $('#sidebar'),
    sidebarOverlay: $('#sidebarOverlay'),
    sidebarClose: $('#sidebarClose'),
    menuBtn: $('#menuBtn'),
    newChatBtn: $('#newChatBtn'),
    chatMessages: $('#chatMessages'),
    chatInput: $('#chatInput'),
    sendBtn: $('#sendBtn'),
    uploadBtn: $('#uploadBtn'),
    fileInput: $('#fileInput'),
    fileIndicator: $('#fileIndicator'),
    fileName: $('#fileName'),
    fileRemove: $('#fileRemove'),
    modelPicker: $('.model-picker'),
    modelTrigger: $('#modelTrigger'),
    modelDropdown: $('#modelDropdown'),
    modelLabel: $('#modelLabel'),
    tokenDot: $('#tokenDot'),
    tokenLabel: $('#tokenLabel'),
    rotateBtn: $('#rotateBtn'),
    generateBtn: $('#generateBtn'),
    imgPrompt: $('#imgPrompt'),
    aspectRatio: $('#aspectRatio'),
    imageResult: $('#imageResult'),
    imagePlaceholder: $('#imagePlaceholder'),
    toastContainer: $('#toastContainer'),
    welcomeMsg: $('#welcomeMsg'),
    chatView: $('#chatView'),
    imageView: $('#imageView'),
    inputArea: $('#inputArea'),
  };

  // ============================================================
  // INIT
  // ============================================================
  function init() {
    renderModelDropdown();
    updateTokenStatus();
    setupListeners();
    autoResize(dom.chatInput);
  }

  // ============================================================
  // MODEL DROPDOWN
  // ============================================================
  function renderModelDropdown() {
    dom.modelDropdown.innerHTML = MODELS.map(m => `
      <div class="model-option ${m.id === state.model ? 'selected' : ''}" data-model="${m.id}">
        <div class="model-radio"></div>
        <div class="model-info">
          <div class="model-name">${m.label}</div>
          <div class="model-desc">${m.desc} · ${m.id}</div>
        </div>
      </div>
    `).join('');

    dom.modelDropdown.querySelectorAll('.model-option').forEach(opt => {
      opt.addEventListener('click', () => {
        state.model = opt.dataset.model;
        const m = MODELS.find(x => x.id === state.model);
        dom.modelLabel.textContent = m.label.split(' ').slice(0,2).join(' ');
        dom.modelDropdown.classList.remove('open');
        state.modelOpen = false;
        renderModelDropdown();
        showToast(`Model: ${m.label}`, 'info');
      });
    });
  }

  // ============================================================
  // TOKEN STATUS
  // ============================================================
  async function updateTokenStatus() {
    dom.tokenDot.className = 'token-dot loading';
    dom.tokenLabel.textContent = 'Checking...';
    try {
      const res = await fetch('/api/token-status');
      const data = await res.json();
      if (data.hasToken) {
        dom.tokenDot.className = 'token-dot';
        dom.tokenLabel.textContent = `Token: ${data.prefix}...`;
      } else {
        dom.tokenDot.className = 'token-dot error';
        dom.tokenLabel.textContent = 'No token';
      }
    } catch {
      dom.tokenDot.className = 'token-dot error';
      dom.tokenLabel.textContent = 'Offline';
    }
  }

  // ============================================================
  // UTILITIES
  // ============================================================
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
    dom.sendBtn.disabled = !el.value.trim() && !state.uploadedFileBase64;
  }

  function showToast(msg, type = 'info') {
    const icons = { success: '✓', error: '✕', info: '✦' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<span>${icons[type] || '✦'}</span><span>${msg}</span>`;
    dom.toastContainer.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function renderMarkdown(text) {
    if (typeof marked !== 'undefined') {
      return marked.parse(text);
    }
    return escapeHtml(text).replace(/\n/g, '<br>');
  }

  // ============================================================
  // MESSAGES
  // ============================================================
  function addMessage(role, html) {
    if (dom.welcomeMsg && dom.welcomeMsg.parentNode) {
      dom.welcomeMsg.remove();
    }

    const group = document.createElement('div');
    group.className = 'msg-group';

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    if (role === 'assistant') {
      const av = document.createElement('div');
      av.className = 'msg-avatar assistant-av';
      av.textContent = '✦';
      row.appendChild(av);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = html;

    row.appendChild(bubble);

    if (role === 'user') {
      const av = document.createElement('div');
      av.className = 'msg-avatar user-av';
      av.textContent = 'U';
      row.appendChild(av);
    }

    group.appendChild(row);
    dom.chatMessages.appendChild(group);
    dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
    return bubble;
  }

  function getStreamingBubble() {
    const bubbles = $$('.msg-bubble', dom.chatMessages);
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      if (b.closest('.msg-row')?.classList.contains('assistant') && b.querySelector('.streaming-cursor')) {
        return b;
      }
    }
    return null;
  }

  // ============================================================
  // SEND MESSAGE
  // ============================================================
  async function sendMessage(textOverride) {
    const text = (textOverride || dom.chatInput.value).trim();
    if (!text && !state.uploadedFileBase64) return;
    if (state.isStreaming) return;

    const model = state.model;
    const hasMedia = !!(state.uploadedFile && state.uploadedFileBase64);

    let userHtml = `<div class="msg-content">${escapeHtml(text)}</div>`;
    if (hasMedia) {
      const isImage = state.uploadedFileMime?.startsWith('image/');
      if (isImage) {
        userHtml = `<img class="uploaded-media" src="data:${state.uploadedFileMime};base64,${state.uploadedFileBase64}" alt="${state.uploadedFile}"><div class="msg-content">${escapeHtml(text)}</div>`;
      } else {
        userHtml = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><span>📄</span><strong>${escapeHtml(state.uploadedFile)}</strong></div><div class="msg-content">${escapeHtml(text)}</div>`;
      }
    }

    addMessage('user', userHtml);

    dom.chatInput.value = '';
    dom.chatInput.style.height = 'auto';
    dom.sendBtn.disabled = true;

    // Clear file
    state.uploadedFile = null;
    state.uploadedFileBase64 = null;
    state.uploadedFileMime = null;
    dom.fileIndicator.classList.remove('active');

    // Create assistant bubble with cursor
    const bubble = addMessage('assistant', '<div class="msg-content"><span class="streaming-cursor"></span></div>');
    state.isStreaming = true;

    try {
      const params = new URLSearchParams({ prompt: text, model });
      if (hasMedia) params.set('media', state.uploadedFileBase64);

      const res = await fetch(`/api/chat/stream?${params}`, {
        headers: hasMedia ? { 'X-Media-Mime': state.uploadedFileMime, 'X-Media-Name': state.uploadedFile } : {}
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const json = JSON.parse(line.slice(6));
              if (json.text) {
                fullText = json.fullText || (fullText + json.text);
                const contentEl = bubble.querySelector('.msg-content');
                contentEl.innerHTML = renderMarkdown(fullText) + '<span class="streaming-cursor"></span>';
                dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
              }
              if (json.error) {
                showToast(json.error, 'error');
              }
            } catch {}
          }
        }
      }

      // Final render
      const contentEl = bubble.querySelector('.msg-content');
      if (fullText) {
        contentEl.innerHTML = renderMarkdown(fullText);
        state.chatHistory.push({ role: 'user', parts: [{ text }] });
        state.chatHistory.push({ role: 'model', parts: [{ text: fullText }] });
      } else {
        contentEl.innerHTML = '<em style="color:var(--text-muted)">No response received</em>';
      }

    } catch (err) {
      const contentEl = bubble.querySelector('.msg-content');
      contentEl.innerHTML = `<span style="color:var(--red)">Error: ${escapeHtml(err.message)}</span>`;
      showToast('Stream error', 'error');
    }

    state.isStreaming = false;
  }

  // ============================================================
  // IMAGE GENERATION
  // ============================================================
  async function generateImage() {
    const prompt = dom.imgPrompt.value.trim();
    if (!prompt) return;

    dom.generateBtn.disabled = true;
    dom.generateBtn.textContent = 'Generating...';
    dom.imagePlaceholder.innerHTML = '<p style="color:var(--text-muted)">✨ Creating your image...</p>';

    try {
      const res = await fetch('/api/generate-image', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, options: { aspectRatio: dom.aspectRatio.value } })
      });
      const data = await res.json();

      if (data.success) {
        dom.imagePlaceholder.style.display = 'none';
        const existing = dom.imageResult.querySelector('.generated-img');
        if (existing) existing.remove();
        const img = document.createElement('img');
        img.className = 'generated-img';
        img.src = data.dataUri;
        dom.imageResult.appendChild(img);
        showToast('Image generated!', 'success');
      } else {
        dom.imagePlaceholder.innerHTML = `<p style="color:var(--red)">Failed: ${escapeHtml(data.msg || 'Unknown error')}</p>`;
        showToast('Generation failed', 'error');
      }
    } catch (err) {
      dom.imagePlaceholder.innerHTML = `<p style="color:var(--red)">Error: ${escapeHtml(err.message)}</p>`;
      showToast('Network error', 'error');
    }

    dom.generateBtn.disabled = false;
    dom.generateBtn.textContent = 'Generate';
  }

  // ============================================================
  // SIDEBAR
  // ============================================================
  function toggleSidebar(open) {
    state.sidebarOpen = open;
    if (open) {
      dom.sidebar.classList.add('open');
      dom.sidebar.classList.remove('collapsed');
      dom.sidebarOverlay.classList.add('active');
    } else {
      dom.sidebar.classList.remove('open');
      dom.sidebarOverlay.classList.remove('active');
    }
  }

  function switchTab(tab) {
    state.activeTab = tab;
    $$('.sidebar-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab));
    dom.chatView.style.display = tab === 'chat' ? 'flex' : 'none';
    dom.imageView.style.display = tab === 'image' ? 'flex' : 'none';
    dom.imageView.classList.toggle('active', tab === 'image');
    dom.inputArea.style.display = tab === 'chat' ? 'block' : 'none';
    // Close sidebar on mobile
    if (window.innerWidth <= 768) toggleSidebar(false);
  }

  // ============================================================
  // SETUP LISTENERS
  // ============================================================
  function setupListeners() {
    // Sidebar
    dom.menuBtn.addEventListener('click', () => toggleSidebar(true));
    dom.sidebarClose.addEventListener('click', () => toggleSidebar(false));
    dom.sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
    dom.newChatBtn.addEventListener('click', () => {
      state.chatHistory = [];
      $$('.msg-group', dom.chatMessages).forEach(el => el.remove());
      if (!dom.chatMessages.contains(dom.welcomeMsg)) {
        const clone = dom.welcomeMsg.cloneNode(true);
        clone.id = 'welcomeMsg';
        dom.welcomeMsg = clone;
        dom.chatMessages.appendChild(clone);
        setupSuggestionListeners();
      }
      switchTab('chat');
      showToast('New chat started', 'info');
    });

    // Tab switching
    $$('.sidebar-item').forEach(item => {
      item.addEventListener('click', () => switchTab(item.dataset.tab));
    });

    // Model picker
    dom.modelTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      state.modelOpen = !state.modelOpen;
      dom.modelDropdown.classList.toggle('open', state.modelOpen);
    });
    document.addEventListener('click', (e) => {
      if (!dom.modelPicker.contains(e.target)) {
        dom.modelDropdown.classList.remove('open');
        state.modelOpen = false;
      }
    });

    // Chat input
    dom.chatInput.addEventListener('input', () => autoResize(dom.chatInput));
    dom.chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    dom.sendBtn.addEventListener('click', () => sendMessage());

    // File upload
    dom.uploadBtn.addEventListener('click', () => dom.fileInput.click());
    dom.fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.uploadedFile = file.name;
        state.uploadedFileBase64 = reader.result.split(',')[1];
        state.uploadedFileMime = file.type;
        dom.fileName.textContent = file.name;
        dom.fileIndicator.classList.add('active');
        dom.sendBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    });
    dom.fileRemove.addEventListener('click', () => {
      state.uploadedFile = null;
      state.uploadedFileBase64 = null;
      state.uploadedFileMime = null;
      dom.fileIndicator.classList.remove('active');
      dom.fileInput.value = '';
      autoResize(dom.chatInput);
    });

    // Image generation
    dom.generateBtn.addEventListener('click', generateImage);
    dom.imgPrompt.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); generateImage(); }
    });

    // Token rotation
    dom.rotateBtn.addEventListener('click', async () => {
      dom.rotateBtn.disabled = true;
      dom.rotateBtn.textContent = '⏳';
      try {
        const res = await fetch('/api/rotate-token', { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          showToast(`Token rotated: ${data.tokenPrefix}`, 'success');
          updateTokenStatus();
        } else {
          showToast('Rotation failed', 'error');
        }
      } catch {
        showToast('Error rotating token', 'error');
      }
      dom.rotateBtn.disabled = false;
      dom.rotateBtn.innerHTML = '⟳';
    });

    // Suggestions
    setupSuggestionListeners();

    // Clear history (Ctrl+L)
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
        e.preventDefault();
        state.chatHistory = [];
        $$('.msg-group', dom.chatMessages).forEach(el => el.remove());
        if (!dom.chatMessages.contains(dom.welcomeMsg)) {
          const clone = dom.welcomeMsg.cloneNode(true);
          clone.id = 'welcomeMsg';
          dom.welcomeMsg = clone;
          dom.chatMessages.appendChild(clone);
          setupSuggestionListeners();
        }
        showToast('Chat history cleared', 'info');
      }
    });
  }

  function setupSuggestionListeners() {
    $$('.suggestion').forEach(btn => {
      btn.addEventListener('click', () => {
        const prompt = btn.dataset.prompt;
        if (prompt) {
          dom.chatInput.value = prompt;
          autoResize(dom.chatInput);
          sendMessage(prompt);
        }
      });
    });
  }

  // ============================================================
  // START
  // ============================================================
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
